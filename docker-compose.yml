version: '3.8'

services:
  db:
    image: postgres:15
    container_name: safetrack_db
    environment:
      POSTGRES_DB: safetrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: safetrack123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: safetrack_app
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: safetrack
      DB_USER: postgres
      DB_PASSWORD: safetrack123
    depends_on:
      - db

volumes:
  postgres_data: